name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Laravel 13 is excluded — Lunar 1.3 caps Laravel at ^12.
        # Re-add when Lunar core opens up.
        php: ['8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    # Tpay sandbox secrets are repo-level; tests skip cleanly when missing
    # (e.g. on PRs from forks).
    env:
      TPAY_CLIENT_ID: ${{ secrets.TPAY_SANDBOX_CLIENT_ID }}
      TPAY_CLIENT_SECRET: ${{ secrets.TPAY_SANDBOX_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: bcmath, exif, intl, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
